name: "irradiate — mutation testing for Python"
description: "Run mutation testing on your Python project with irradiate. Auto-annotates survived mutants in PR diffs."
branding:
  icon: "zap"
  color: "yellow"

inputs:
  version:
    description: "irradiate version to install (e.g. '0.1.1'). Default: latest."
    required: false
    default: ""
  paths-to-mutate:
    description: "Source paths to mutate (space-separated). Overrides pyproject.toml."
    required: false
    default: ""
  tests-dir:
    description: "Path to test directory. Overrides pyproject.toml."
    required: false
    default: ""
  diff:
    description: "Only mutate functions changed since this git ref (e.g. 'origin/main'). Great for PR checks."
    required: false
    default: ""
  fail-under:
    description: "Fail the step if mutation score is below this percentage (0-100)."
    required: false
    default: ""
  sample:
    description: "Test a random subset of mutants. Values 0.0-1.0 are fractions, >1 are absolute counts."
    required: false
    default: ""
  report:
    description: "Generate a report ('json' or 'html')."
    required: false
    default: ""
  report-output:
    description: "Output path for the report file."
    required: false
    default: ""
  workers:
    description: "Number of parallel workers. Default: number of CPUs."
    required: false
    default: ""
  python-version:
    description: "Python version to use. Default: '3.12'."
    required: false
    default: "3.12"
  extra-args:
    description: "Additional arguments passed directly to `irradiate run`."
    required: false
    default: ""

outputs:
  score:
    description: "Mutation score as a percentage (e.g. '85.7')."
    value: ${{ steps.run.outputs.score }}
  killed:
    description: "Number of killed mutants."
    value: ${{ steps.run.outputs.killed }}
  survived:
    description: "Number of survived mutants."
    value: ${{ steps.run.outputs.survived }}
  total:
    description: "Total number of mutants tested."
    value: ${{ steps.run.outputs.total }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install irradiate
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "irradiate==${{ inputs.version }}"
        else
          pip install irradiate
        fi

    - name: Install project test dependencies
      shell: bash
      run: |
        if [ -f pyproject.toml ]; then
          pip install -e ".[dev]" 2>/dev/null || pip install -e ".[test]" 2>/dev/null || pip install -e . 2>/dev/null || true
        fi
        pip install pytest

    - name: Run irradiate
      id: run
      shell: bash
      env:
        INPUT_PATHS_TO_MUTATE: ${{ inputs.paths-to-mutate }}
        INPUT_TESTS_DIR: ${{ inputs.tests-dir }}
        INPUT_DIFF: ${{ inputs.diff }}
        INPUT_FAIL_UNDER: ${{ inputs.fail-under }}
        INPUT_SAMPLE: ${{ inputs.sample }}
        INPUT_REPORT: ${{ inputs.report }}
        INPUT_REPORT_OUTPUT: ${{ inputs.report-output }}
        INPUT_WORKERS: ${{ inputs.workers }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        args=""

        if [ -n "$INPUT_PATHS_TO_MUTATE" ]; then
          for p in $INPUT_PATHS_TO_MUTATE; do
            args="$args --paths-to-mutate $p"
          done
        fi

        if [ -n "$INPUT_TESTS_DIR" ]; then
          args="$args --tests-dir $INPUT_TESTS_DIR"
        fi

        if [ -n "$INPUT_DIFF" ]; then
          args="$args --diff $INPUT_DIFF"
        fi

        if [ -n "$INPUT_FAIL_UNDER" ]; then
          args="$args --fail-under $INPUT_FAIL_UNDER"
        fi

        if [ -n "$INPUT_SAMPLE" ]; then
          args="$args --sample $INPUT_SAMPLE"
        fi

        if [ -n "$INPUT_REPORT" ]; then
          args="$args --report $INPUT_REPORT"
        fi

        if [ -n "$INPUT_REPORT_OUTPUT" ]; then
          args="$args --output $INPUT_REPORT_OUTPUT"
        fi

        if [ -n "$INPUT_WORKERS" ]; then
          args="$args --workers $INPUT_WORKERS"
        fi

        if [ -n "$INPUT_EXTRA_ARGS" ]; then
          args="$args $INPUT_EXTRA_ARGS"
        fi

        # Run and capture output for parsing
        set +e
        irradiate run $args 2>&1 | tee /tmp/irradiate-output.txt
        exit_code=${PIPESTATUS[0]}
        set -e

        # Parse outputs (POSIX-compatible, no -P flag)
        killed=$(sed -n 's/.*Killed:[[:space:]]*\([0-9]*\).*/\1/p' /tmp/irradiate-output.txt)
        survived=$(sed -n 's/.*Survived:[[:space:]]*\([0-9]*\).*/\1/p' /tmp/irradiate-output.txt)
        killed=${killed:-0}
        survived=${survived:-0}
        total=$((killed + survived))
        if [ "$total" -gt 0 ]; then
          score=$(echo "scale=1; $killed * 100 / $total" | bc)
        else
          score="0.0"
        fi

        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "killed=$killed" >> "$GITHUB_OUTPUT"
        echo "survived=$survived" >> "$GITHUB_OUTPUT"
        echo "total=$total" >> "$GITHUB_OUTPUT"

        exit $exit_code
