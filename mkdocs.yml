site_name: irradiate
site_description: Mutation testing for Python, written in Rust
site_url: https://nwyin.github.io/irradiate 
repo_url: https://github.com/nwyin/irradiate
repo_name: irradiate

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{slug}"
      categories_allowed:
        - Mutation Testing
        - Release Notes
        - Engineering
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Guide:
    - Understanding Results: guide/understanding-results.md
    - CI Integration: guide/ci-integration.md
    - Comparison: guide/comparison.md
  - Reference:
    - CLI: reference/cli.md
  - Internals:
    - Architecture: internals/architecture.md
    - The Trampoline: internals/trampoline.md
    - Mutation Operators: internals/mutation-operators.md
    - Import Hook: internals/import-hook.md
    - Decorators: internals/decorators.md
    - Contributing: internals/contributing.md
    - Mutation Pruning: internals/mutation-pruning.md
  - Blog: blog/index.md
