repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        types: [rust]

      - id: ruff-check
        name: ruff check
        entry: uvx ruff check harness/
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uvx ruff format --check harness/
        language: system
        pass_filenames: false
        types: [python]

      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        pass_filenames: false
        types: [rust]
        stages: [pre-push]
