name: Benchmark

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Space-separated target names (blank = all 6)"
        default: ""
      runs:
        description: "Timed runs per config"
        default: "3"
      mutmut:
        description: "Include mutmut comparison"
        type: boolean
        default: true
      isolate:
        description: "Include irradiate isolate config"
        type: boolean
        default: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('Cargo.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup (build release binary, clone corpora, install venvs)
        run: bash bench/setup.sh

      - name: Run benchmarks
        env:
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_TARGETS: ${{ inputs.targets }}
          BENCH_MUTMUT: ${{ inputs.mutmut && '1' || '' }}
          BENCH_ISOLATE: ${{ inputs.isolate && '1' || '' }}
          # Cap parallelism — ubuntu-latest has 4 vCPUs but only 7 GB RAM.
          # mutmut forks N children that each dirty CoW pages; 2 keeps peak RSS safe.
          BENCH_NCPU: "2"
        run: bash bench/run_all.sh

      - name: Find results directory
        if: always()
        id: results
        run: |
          dir=$(ls -td bench/results/*/ 2>/dev/null | head -1)
          echo "dir=${dir:-.}" >> "$GITHUB_OUTPUT"

      - name: Post summary
        if: always()
        run: |
          agg="${{ steps.results.outputs.dir }}/aggregate.md"
          if [ -f "$agg" ]; then
            cat "$agg" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Benchmark incomplete" >> "$GITHUB_STEP_SUMMARY"
            echo "Some targets may have failed. Check artifacts for partial results." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/results/
          retention-days: 90
