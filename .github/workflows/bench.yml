name: Benchmark

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Space-separated target names (blank = all 6)"
        default: ""
      runs:
        description: "Timed runs per config"
        default: "3"
      mutmut:
        description: "Include mutmut comparison"
        type: boolean
        default: true
      isolate:
        description: "Include irradiate isolate config"
        type: boolean
        default: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('Cargo.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup (build release binary, clone corpora, install venvs)
        run: bash bench/setup.sh

      - name: Run benchmarks
        env:
          BENCH_RUNS: ${{ inputs.runs }}
          BENCH_TARGETS: ${{ inputs.targets }}
          BENCH_MUTMUT: ${{ inputs.mutmut && '1' || '' }}
          BENCH_ISOLATE: ${{ inputs.isolate && '1' || '' }}
        run: bash bench/run_all.sh

      - name: Find results directory
        id: results
        run: |
          dir=$(ls -td bench/results/*/ | head -1)
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Post summary
        run: cat "${{ steps.results.outputs.dir }}/aggregate.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ${{ steps.results.outputs.dir }}
          retention-days: 90
